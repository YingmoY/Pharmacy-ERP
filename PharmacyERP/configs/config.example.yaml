app:
  name: pharmacy-erp
  env: dev

server:
  mode: debug
  host: 0.0.0.0
  port: 8080
  read_timeout: 10s
  write_timeout: 10s
  shutdown_timeout: 10s

database:
  host: 127.0.0.1
  port: 5432
  user: your_db_user
  password: your_db_password
  name: pharmacy_erp
  ssl_mode: disable
  timezone: Asia/Shanghai
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime_minutes: 60
  log_sql: true

rabbitmq:
  enabled: true
  uri: amqp://guest:guest@127.0.0.1:5672/
  log_queue: operation_log_queue
  prefetch: 20
  mandatory: false

jwt:
  secret: replace_with_a_secure_secret
  expire_time: 24h
  issuer: pharmacy-erp

log:
  level: info
  format: console

medicare:
  enabled: false
  base_url: http://localhost:8088
  timeout: 30s
