# Casbin model for 智慧药店 ERP 主系统
#
# Policy source:
# - Runtime policies are loaded from database table: public.casbin_rule
# - public.casbin_rule is generated by refresh_casbin_rule_from_rbac()
# - Do not maintain casbin_policy.csv manually anymore
#
# Subject format used by backend:
# - r.sub = user:{id}, e.g. user:12
# - g policy links user:{id} -> ROLE_CODE

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = g(r.sub, p.sub) && keyMatch2(r.obj, p.obj) && regexMatch(r.act, p.act)
