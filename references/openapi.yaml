      type: object
      required:
      - drug_id
      - unit_price
      properties:
        drug_id:
          type: integer
          format: int64
        quantity:
          type: integer
          enum:
          - 1
          minimum: 1
          maximum: 1
          default: 1
          description: 固定为 1。保留字段仅用于兼容前端表单，不允许提交大于 1 的数量。
        unit_price:
          type: number
          format: decimal
        trace_code:
          type: string
          description: 指定追溯码。可选；不填则由系统自动匹配一个可售追溯码。
          nullable: true
      description: 添加销售明细。每次添加一盒药/一个追溯码；多盒请重复添加或传多条明细。
