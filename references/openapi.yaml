      type: object
      required:
      - payment_method
      - actual_amount
      properties:
        payment_method:
          type: string
          enum:
          - CASH
          - WECHAT
          - ALIPAY
          - MEDICARE_CARD
          - OTHER
        actual_amount:
          type: number
          format: decimal
          minimum: 0
    RefundSalesOrderRequest:
      type: object
      description: 销售退货请求。refund_mode 必填。FULL 表示全单退货；PARTIAL 表示部分退货，必须通过 detail_ids
        精确指定要退的销售明细。每条销售明细唯一对应一盒药/一个追溯码。
      properties:
        refund_mode:
          type: string
          enum:
          - FULL
          - PARTIAL
          default: FULL
          description: 必填。FULL:全单退货；PARTIAL:部分退货。PARTIAL 时 detail_ids 必填且不能为空。
        detail_ids:
          type: array
          description: 需要退货的销售明细 ID 列表。refund_mode=PARTIAL 时必填且不能为空；refund_mode=FULL
            时可省略。已退明细不得重复退货。
          items:
            type: integer
            format: int64
          example:
          - 101
          - 102
        remark:
          type: string
          description: 退货原因
      required:
      - refund_mode
