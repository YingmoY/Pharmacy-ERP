          enum:
          - LOSS
          - GAIN
          - RELOCATE
          - DAMAGE
          - EXPIRE
          - MANUAL
        trace_code:
          type: string
        drug_id:
          type: integer
          format: int64
        from_location_id:
          type: integer
          format: int64
          nullable: true
        to_location_id:
          type: integer
          format: int64
          nullable: true
        before_status:
          type: string
        after_status:
          type: string
        reason:
          type: string
        operator_id:
          type: integer
          format: int64
        operator_name:
          type: string
        created_at:
          type: string
          format: date-time
    InventoryAdjustmentPageResult:
      allOf:
      - $ref: '#/components/schemas/PageMeta'
      - type: object
        properties:
          list:
            type: array
            items:
              $ref: '#/components/schemas/InventoryAdjustment'
    CreateInventoryAdjustmentRequest:
      type: object
      required:
      - adjust_type
      - trace_code
      - reason
      properties:
        adjust_type:
          type: string
          enum:
          - LOSS
          - GAIN
          - RELOCATE
          - DAMAGE
          - EXPIRE
          - MANUAL
        trace_code:
          type: string
        to_location_id:
          type: integer
          format: int64
        after_status:
          type: string
        reason:
          type: string
    ConfirmLossRequest:
      type: object
      required:
      - reason
      properties:
        reason:
          type: string
    RejectLossRequest:
      type: object
      required:
      - reason
      properties:
        reason:
          type: string
    RelocateMisplacedRequest:
      type: object
      required:
      - target_location_id
      properties:
        target_location_id:
          type: integer
          format: int64
        reason:
          type: string
    OperationLog:
      type: object
      properties:
        id:
          type: integer
          format: int64
        operator_id:
          type: integer
          format: int64
          nullable: true
        operator_name:
          type: string
          nullable: true
        module:
          type: string
        action:
          type: string
        resource_type:
          type: string
        resource_id:
          type: string
        before_data:
          type: object
          nullable: true
        after_data:
          type: object
          nullable: true
        ip:
          type: string
        user_agent:
          type: string
        created_at:
          type: string
          format: date-time
    OperationLogPageResult:
      allOf:
      - $ref: '#/components/schemas/PageMeta'
      - type: object
        properties:
          list:
            type: array
            items:
              $ref: '#/components/schemas/OperationLog'
    LoginLog:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        success:
          type: boolean
        ip:
          type: string
        user_agent:
          type: string
        message:
          type: string
        created_at:
          type: string
          format: date-time
    LoginLogPageResult:
      allOf:
      - $ref: '#/components/schemas/PageMeta'
      - type: object
        properties:
          list:
            type: array
            items:
              $ref: '#/components/schemas/LoginLog'
    SecurityEvent:
      type: object
      properties:
        id:
          type: integer
          format: int64
        event_type:
          type: string
        severity:
          type: string
          enum:
          - LOW
          - MEDIUM
          - HIGH
          - CRITICAL
        description:
          type: string
        ip:
          type: string
        created_at:
          type: string
          format: date-time
    SecurityEventPageResult:
      allOf:
      - $ref: '#/components/schemas/PageMeta'
      - type: object
        properties:
          list:
            type: array
            items:
              $ref: '#/components/schemas/SecurityEvent'
    DataChangeLog:
      type: object
      properties:
        id:
          type: integer
          format: int64
        table_name:
          type: string
        record_id:
          type: string
        change_type:
          type: string
          enum:
          - INSERT
          - UPDATE
          - DELETE
        before_data:
          type: object
          nullable: true
        after_data:
          type: object
          nullable: true
        operator_name:
          type: string
        created_at:
          type: string
          format: date-time
    DataChangeLogPageResult:
      allOf:
      - $ref: '#/components/schemas/PageMeta'
      - type: object
        properties:
          list:
            type: array
            items:
              $ref: '#/components/schemas/DataChangeLog'
    ReportExportRequest:
      type: object
      required:
      - format
      properties:
        format:
          type: string
          enum:
          - XLSX
          - CSV
          - PDF
        filters:
          type: object
          description: 与对应查询报表一致的过滤条件
        async:
          type: boolean
          default: true
    ReportExportTask:
      type: object
      properties:
        task_id:
          type: string
        report_type:
          type: string
        status:
          type: string
          enum:
          - PENDING
          - RUNNING
          - SUCCESS
          - FAILED
        file_id:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true
    RoleCode:
      type: string
      maxLength: 50
      pattern: ^[A-Z][A-Z0-9_]{1,49}$
      description: 角色编码，来自数据库 sys_role.code；角色可动态维护，不在 OpenAPI 中固定枚举。
      example: PHARMACY_STAFF
    UpdateInboundOrderRequest:
      type: object
      description: 更新入库单基本信息。仅允许在 DRAFT 状态下修改；供应商必须通过 supplier_id 指向供应商主数据。
      properties:
        supplier_id:
          type: integer
          format: int64
          description: 供应商 ID，必须来自供应商主数据 sys_supplier.id
          example: 1
        invoice_no:
          type: string
          maxLength: 100
        remark:
          type: string
  responses:
    UnauthorizedError:
      description: 未登录或令牌无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: 无权限访问该接口
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: 资源状态冲突或并发冲突
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: 请求参数或业务校验失败
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: 系统内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
paths:
  /api/v1/health:
    get:
      tags:
      - 系统通用
      summary: 系统健康检查
      description: 检查主系统进程、数据库连接和 RabbitMQ 状态。
      operationId: getHealth
      security: []
      responses:
        '200':
          description: 系统正常
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/HealthCheckResult'
  /api/v1/files/upload:
    post:
      tags:
      - 系统通用
      summary: 上传文件
      description: 上传发票图片、PDF 等文件，返回文件 ID 和访问 URL，供后续 AI 识别接口使用。
      operationId: uploadFile
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
                  description: 文件内容
                biz_type:
                  type: string
                  enum:
                  - INVOICE
                  - OTHER
                  description: 业务类型标识
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/FileUploadResult'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenError'
      x-permission:
        code: files.create
        resource: files
        action: create
  /api/v1/files/{file_id}:
    get:
      tags:
      - 系统通用
      summary: 获取文件信息
      operationId: getFileInfo
      security:
      - bearerAuth: []
      parameters:
      - name: file_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/FileUploadResult'
        '404':
          description: 文件不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '400':
          $ref: '#/components/responses/ValidationError'
      x-permission:
        code: files.read
        resource: files
        action: read
  /api/v1/auth/login:
    post:
      tags:
      - 认证与用户
      summary: 用户登录
      description: 用户名密码登录，返回单个 JWT token。
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: admin
              password: Admin@123
              client_type: WEB
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/LoginData'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 用户名或密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/logout:
    post:
      tags:
      - 认证与用户
      summary: 用户登出
      description: 使当前 JWT token 失效（服务端可按 jti 加入黑名单，或按会话版本号使旧 token 失效）。该接口只校验 Bearer
        JWT，不经过业务 RBAC 权限点校验。
      operationId: logout
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /api/v1/auth/me:
    get:
      tags:
      - 认证与用户
      summary: 获取当前用户信息
      description: 返回当前登录用户的基本信息、角色编码和有效权限编码列表。该接口只校验 Bearer JWT，不经过业务 RBAC 权限点校验。
      operationId: getCurrentUser
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/UserInfo'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /api/v1/auth/password:
    put:
      tags:
      - 认证与用户
      summary: 修改当前用户密码
      description: 用户修改自己的密码，需提供旧密码验证。该接口只校验 Bearer JWT，不经过业务 RBAC 权限点校验。
      operationId: changePassword
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: 旧密码错误或新密码不符合规则
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/users:
    get:
      tags:
      - 认证与用户
      summary: 用户列表
      description: 分页查询系统用户，支持按角色、状态、姓名过滤。需要 users.read 权限，实际访问控制以 RBAC 授权为准。
      operationId: listUsers
      security:
      - bearerAuth: []
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: page_size
        in: query
        schema:
          type: integer
          default: 20
          maximum: 100
      - name: role_code
        in: query
        description: 按角色编码过滤，角色编码来自 sys_role.code，不在 OpenAPI 中写死枚举。
        schema:
          type: string
          description: 角色编码，来自 sys_role.code。
          maxLength: 50
          pattern: ^[A-Z][A-Z0-9_]{1,49}$
          example: PHARMACY_STAFF
      - name: status
        in: query
        description: 按状态过滤，1:正常, 0:禁用
        schema:
          type: integer
          enum:
          - 0
          - 1
      - name: keyword
        in: query
        description: 按用户名或真实姓名模糊搜索
        schema:
          type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/UserPageResult'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 无权限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
      x-permission:
        code: users.read
        resource: users
        action: read
    post:
      tags:
      - 认证与用户
      summary: 创建用户
      description: 创建新系统用户。需要 users.create 权限，实际访问控制以 RBAC 授权为准。
      operationId: createUser
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/UserInfo'
        '400':
          description: 参数错误或用户名已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 无权限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
      x-permission:
        code: users.create
        resource: users
        action: create
  /api/v1/users/{id}:
    get:
      tags:
      - 认证与用户
      summary: 用户详情
      operationId: getUserById
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/UserInfo'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '400':
          $ref: '#/components/responses/ValidationError'
      x-permission:
        code: users.read
        resource: users
        action: read
    put:
      tags:
      - 认证与用户
      summary: 更新用户信息
      description: 修改用户真实姓名、状态等基础信息。需要 users.update 权限，实际访问控制以 RBAC 授权为准。用户角色分配请使用用户角色接口。
      operationId: updateUser
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/UserInfo'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 无权限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
      x-permission:
        code: users.update
        resource: users
        action: update
  /api/v1/users/{id}/status:
    patch:
      tags:
      - 认证与用户
      summary: 启用/禁用用户
      description: 切换用户账号状态。需要 users.status.update 权限，实际访问控制以 RBAC 授权为准。
      operationId: toggleUserStatus
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              properties:
                status:
                  type: integer
                  enum:
                  - 0
                  - 1
                  description: 1:启用, 0:禁用
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '403':
          description: 无权限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '400':
          $ref: '#/components/responses/ValidationError'
      x-permission:
        code: users.status.update
        resource: users
        action: status.update
  /api/v1/users/{id}/reset-password:
    post:
      tags:
      - 认证与用户
      summary: 重置用户密码
      description: 重置指定用户的密码。需要 users.password.reset 权限，实际访问控制以 RBAC 授权为准。
      operationId: resetUserPassword
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - new_password
              properties:
                new_password:
                  type: string
                  format: password
                  minLength: 8
      responses:
        '200':
          description: 重置成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '403':
          description: 无权限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '400':
          $ref: '#/components/responses/ValidationError'
      x-permission:
        code: users.password.reset
        resource: users
        action: password.reset
  /api/v1/drugs:
    get:
      tags:
      - 基础资料-药品
      summary: 药品列表
      description: 分页查询药品基础信息，支持按通用名、商品名、厂家、状态过滤。
      operationId: listDrugs
      security:
      - bearerAuth: []
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: page_size
        in: query
        schema:
          type: integer
          default: 20
          maximum: 100
      - name: keyword
        in: query
        description: 按通用名或商品名模糊搜索
        schema:
          type: string
      - name: manufacturer
        in: query
        description: 按厂家过滤
        schema:
          type: string
      - name: is_prescription
        in: query
        description: 是否处方药
        schema:
          type: boolean
      - name: is_medicare
        in: query
        description: 是否医保药品
        schema:
          type: boolean
      - name: status
        in: query
        description: 启用状态，1:启用, 0:停用
        schema:
          type: integer
          enum:
          - 0
          - 1
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
