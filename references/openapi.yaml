  /api/v1/sales-orders/{id}/pay:
    post:
      tags:
      - 销售管理
      summary: 销售结算
      description: '对 PENDING 或 APPROVED 状态的销售单进行结算。处方药销售单必须先经药师审核通过，状态为 APPROVED
        后才能结算。结算触发以下操作：

        1. 将销售单状态更新为 COMPLETED

        2. 将所有明细行关联的追溯码状态更新为 SOLD

        3. 将对应 trace_reservation 从 RESERVED 更新为 CONSUMED

        4. 在 drug_trace_log 中写入 SALE 动作记录

        5. 记录支付方式和实收金额'
      operationId: paySalesOrder
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaySalesOrderRequest'
            example:
              payment_method: CASH
              actual_amount: 25.0
      responses:
        '200':
          description: 结算成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/SalesOrder'
        '400':
          description: 实收金额不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 销售单状态不是 PENDING 或 APPROVED，或处方药尚未审核通过
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
      x-permission:
        code: sales.orders.pay
        resource: sales-orders
        action: pay
