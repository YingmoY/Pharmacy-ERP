      - 入库管理
      summary: 批量追溯码扫码确认
      description: '批量提交追溯码确认，适用于移动端批量上传场景。

        系统对每个追溯码单独处理，返回每个追溯码的处理结果。

        通过数据库 UNIQUE(task_id, trace_code) 约束防止重复扫码。

        '
      operationId: batchConfirmTraceCodes
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchConfirmTraceCodesRequest'
      responses:
        '200':
          description: 批量处理完成（部分失败时也返回 200，通过 results 字段查看每条结果）
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        success_count:
                          type: integer
                          description: 成功确认数量
                        fail_count:
                          type: integer
                          description: 失败数量
                        results:
                          type: array
                          items:
                            type: object
                            properties:
                              trace_code:
                                type: string
                              result:
                                type: string
                                enum:
                                - SUCCESS
                                - DUPLICATE
                                - INVALID
                              message:
                                type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '400':
          $ref: '#/components/responses/ValidationError'
