          type: integer
          format: int64
          description: 供应商 ID，必须来自供应商主数据 sys_supplier.id
          example: 1
        invoice_no:
          type: string
          description: 发票号；不传时可使用识别结果中的 invoice_no
        remark:
          type: string
        items:
          type: array
          minItems: 1
          description: 确认后的入库明细。前端应展示 AI 识别结果并让用户确认/修正 drug_id、批号、有效期、数量、单价。
