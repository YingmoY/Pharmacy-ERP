        in: query
        description: 按收银员 ID 过滤
        schema:
          type: integer
          format: int64
      - name: start_date
        in: query
        schema:
          type: string
          format: date
      - name: end_date
        in: query
        schema:
          type: string
          format: date
      - name: is_prescription
        in: query
        description: 是否处方单
        schema:
          type: boolean
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/SalesOrderPageResult'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '400':
          $ref: '#/components/responses/ValidationError'
      x-permission:
        code: sales.orders.read
        resource: sales-orders
        action: read
    post:
      tags:
      - 销售管理
      summary: 创建销售单
      description: '创建销售单。后端根据 is_prescription 与药品主数据自动判断是否需要药师审核：

        - 需要审核：创建为 PENDING_REVIEW，并生成药师审核记录

        - 不需要审核：创建为 PENDING，可直接结算

        销售单的 need_audit 由后端计算，前端不得传入。购买多盒药时应提交多个 item；每个 item 固定代表一盒药/一个追溯码。'
      operationId: createSalesOrder
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSalesOrderRequest'
            example:
              customer_name: 张三
              is_prescription: false
              items:
              - drug_id: 1
                quantity: 1
                unit_price: 12.5
              - drug_id: 1
                quantity: 1
                unit_price: 12.5
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/SalesOrderWithDetails'
        '400':
          description: 参数错误或库存不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
      x-permission:
        code: sales.orders.create
        resource: sales-orders
        action: create
