      summary: 单个追溯码扫码确认
      description: '对 PENDING_CONFIRM 状态的入库单，逐个扫描并确认追溯码。

        系统将在 drug_trace_inventory 中创建一条 PENDING 状态的记录，

        并将对应明细行的 confirmed_qty 加 1。

        若追溯码已存在于系统中，返回 409。

        '
      operationId: confirmTraceCode
      security:
      - bearerAuth: []
