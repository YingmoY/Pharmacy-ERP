openapi: 3.0.3
info:
  title: 智慧药店 ERP 系统 API
  version: 3.3.2-single-jwt-rbac-fix
  description: '智慧药店 ERP 主系统 API（RBAC 数据库权限源版）。


    边界说明：医保网关与 AI 辅助能力为独立服务，主 ERP 系统只负责调用这些服务并保存必要的业务结果。

    因此本 OpenAPI 不定义医保网关和 AI 服务的内部实现接口；但保留文件上传、AI 发票识别结果、识别结果转入库单等主系统需要暴露给前端的业务 DTO/接口说明。


    权限说明：健康检查和登录接口不需要认证；/auth/me、/auth/logout、/auth/password 等当前用户自助接口只要求 Bearer JWT，不经过业务
    RBAC 权限点校验；其余业务接口均要求 Bearer JWT，并通过 Casbin RBAC 校验。

    权限运行时来源为数据库：sys_role、sys_user_role、sys_permission、sys_role_permission、sys_permission_api。

    casbin_model.conf 只定义匹配模型；casbin_policy.csv 已弃用，不再作为权限来源。


    推荐运行方式：

    1. 后端维护 sys_user_role / sys_role_permission / sys_permission_api；

    2. 权限变更后调用数据库函数 refresh_casbin_rule_from_rbac() 生成 Casbin 标准 casbin_rule；

    3. Casbin Adapter 从 casbin_rule 加载 p/g 规则；

    4. Enforce 时 sub 使用 user:{用户ID}，例如 user:12。


    统一响应格式：所有 JSON 响应均使用 { code, message, data, request_id } 包装。code=200 表示业务成功。


    本版修订：角色编码不再在 OpenAPI 中写死枚举，实际可选角色来自 sys_role.code；入库单创建/修改/AI 转入库统一使用 supplier_id
    指向供应商主数据；主 ERP 明确暴露 AI 发票识别调用与识别结果转入库单接口；成功响应统一通过 ApiResponse wrapper + data 组合表达。


    本版修订补充：x-permission 仅声明 code/resource/action，不再写死可访问角色；角色授权以数据库 sys_role_permission
    为准。扫码任务支持 SHELVING 类型和 CANCELLED 状态，并统一使用 IN_PROGRESS 表示进行中。处方药审核通过后销售单状态为 APPROVED，销售结算允许
    PENDING 或 APPROVED。创建类接口中的 operator_id/creator_id 由后端从 JWT 当前用户生成，前端不得传入。AI 发票识别结果由主系统保存到
    ai_invoice_record。库存预占以 trace_reservation 为唯一业务来源，drug_trace_inventory 只保存追溯码当前库存状态。'
servers:
- url: http://localhost:8080
  description: 本地开发环境
- url: https://pharmacy.yingmoy.com
  description: 测试/生产环境
tags:
- name: 系统通用
  description: 健康检查、文件上传等系统级接口
- name: 认证与用户
  description: 登录、当前用户信息、用户管理（CRUD）
- name: 基础资料-药品
  description: 药品基础信息维护（drug_info 表）
- name: 基础资料-货位
  description: 货位信息维护（location_info 表）
- name: AI辅助
  description: 主 ERP 调用独立 AI 子模块完成发票识别、结果留存与转入库单
- name: 入库管理
  description: 采购入库单创建、追溯码扫码确认、入库完成
- name: 上架管理
  description: 待上架追溯码查询、扫码上架、货位调拨
- name: 库存与追溯
  description: 追溯码库存查询、状态变更、全链路轨迹查询
- name: 扫码作业
  description: 移动端扫码任务管理（入库/盘库通用）
- name: 盘库管理
  description: 盘库任务创建、执行、差异处理
- name: 销售管理
  description: 收银开单、扫码出库、医保结算、退款
- name: 药师审核
  description: 处方药销售单的药师审核流程
- name: 审计与日志
  description: 操作日志查询、审计事件管理
- name: 权限管理
  description: RBAC 角色、权限、用户授权管理
- name: 供应商管理
  description: 供应商基础资料维护
- name: 库存调整
  description: 盘库差异、手工调整、错架修正等库存调整闭环
- name: 报表任务
  description: 报表导出任务与文件下载
- name: 预警与通知
  description: 近效期、库存、系统通知等预警信息
- name: 统计看板
  description: 首页看板与统计图表
- name: 报表导出
  description: 销售、入库、库存、追溯报表查询
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: '使用 /api/v1/auth/login 获取的单个 JWT token；请求头格式为 Authorization: Bearer
        {token}'
  schemas:
    ApiResponse:
      type: object
      description: 统一成功响应包装器。所有 application/json 成功响应均使用该结构；data 的具体类型由接口通过 allOf
        覆盖。code=200 表示业务成功。
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: object
          nullable: true
          description: 业务数据；无业务数据时为 null 或空对象
        request_id:
          type: string
          description: 请求追踪 ID，用于日志排查和前后端问题定位
          example: req_20260609_000001
      required:
      - code
      - message
      - request_id
    ErrorResponse:
      type: object
      description: 统一错误响应
      properties:
        code:
          type: integer
          description: 业务错误码
          example: 400
        message:
          type: string
          description: 错误描述
          example: 参数错误：drug_code 不能为空
        data:
          type: object
          nullable: true
        request_id:
          type: string
          description: 请求追踪 ID，用于日志排查和前后端问题定位
          example: req_20260609_000001
      required:
      - code
      - message
      - request_id
    PageMeta:
      type: object
      description: 分页元数据
      properties:
        total:
          type: integer
          description: 总记录数
          example: 100
        page:
          type: integer
          description: 当前页码
          example: 1
        page_size:
          type: integer
          description: 每页数量
          example: 20
        total_pages:
          type: integer
          description: 总页数
          example: 5
    HealthCheckResult:
      type: object
      properties:
        status:
          type: string
          enum:
          - UP
          - DOWN
          example: UP
        database:
          type: string
          enum:
          - UP
          - DOWN
          example: UP
        message_queue:
          type: string
          enum:
          - UP
          - DOWN
          example: UP
        timestamp:
          type: string
          format: date-time
    FileUploadResult:
      type: object
      properties:
        file_id:
          type: string
          description: 文件唯一 ID
          example: f_20240101_abc123
        file_name:
          type: string
          example: invoice_001.pdf
        file_url:
          type: string
          description: 文件访问 URL
          example: https://cdn.example.com/files/invoice_001.pdf
        file_size:
          type: integer
          description: 文件大小（字节）
          example: 204800
        content_type:
          type: string
          example: application/pdf
        upload_time:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: admin
        password:
          type: string
          format: password
          minLength: 6
          example: Admin@123
        client_type:
          type: string
          enum:
          - WEB
          - MOBILE
          default: WEB
          description: 客户端类型
    LoginData:
      type: object
      description: 登录成功返回的数据。系统只使用一个 JWT token，不再使用双 token 体系。
      required:
      - token
      - expires_in
      - token_type
      - user
      properties:
        token:
          type: string
          description: JWT 令牌，用于后续所有需要认证的接口
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        expires_in:
          type: integer
          description: JWT 有效期（秒）
          example: 7200
        token_type:
          type: string
          description: '令牌类型；前端请求时使用 Authorization: Bearer {token}'
          example: Bearer
        user:
          $ref: '#/components/schemas/UserInfo'
    ChangePasswordRequest:
      type: object
      required:
      - old_password
      - new_password
      properties:
        old_password:
          type: string
          format: password
        new_password:
          type: string
          format: password
          minLength: 8
          description: 新密码，至少 8 位，需包含字母和数字
    UserInfo:
      type: object
      description: 用户信息
      properties:
        id:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: admin
        real_name:
          type: string
          example: 张三
        status:
          type: integer
          enum:
          - 0
          - 1
          description: 1:正常, 0:禁用
          example: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        roles:
          type: array
          description: 用户拥有的角色编码列表，角色来自数据库 sys_role.code，前端不要写死角色名进行权限判断。
          items:
            $ref: '#/components/schemas/RoleCode'
          example:
          - CASHIER
        permission_codes:
          type: array
          description: 当前用户通过角色聚合后的有效权限编码列表，用于前端菜单、路由、按钮控制。权限编码来自 sys_permission.code。
          items:
            type: string
            example: sales.orders.read
          example:
          - dashboard.read
          - sales.orders.read
          - sales.orders.create
          - sales.orders.pay
    CreateUserRequest:
      type: object
      required:
      - username
      - password
      - real_name
      - role_codes
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          format: password
          minLength: 8
        real_name:
          type: string
          maxLength: 50
        role_codes:
          type: array
          description: 用户初始角色编码列表。创建后也可通过 PUT /api/v1/users/{id}/roles 全量覆盖。
          minItems: 1
          items:
            $ref: '#/components/schemas/RoleCode'
          example:
          - CASHIER
    UpdateUserRequest:
      type: object
      properties:
        real_name:
          type: string
          maxLength: 50
      description: 更新用户基础信息。角色分配请使用 PUT /api/v1/users/{id}/roles，避免单角色字段与多角色 RBAC
        产生歧义。
    UserPageResult:
      allOf:
      - $ref: '#/components/schemas/PageMeta'
      - type: object
        properties:
          list:
            type: array
            items:
              $ref: '#/components/schemas/UserInfo'
    DrugInfo:
      type: object
      description: 药品基础信息
      properties:
        id:
          type: integer
          format: int64
          example: 1
        drug_code:
          type: string
          description: 药品统一编码（本位码）
          example: H20050001
        common_name:
          type: string
          description: 通用名
          example: 阿莫西林胶囊
        trade_name:
          type: string
          description: 商品名
          example: 阿莫仙
        specification:
          type: string
          description: 规格
          example: 0.25g×24粒/盒
        dosage_form:
          type: string
          description: 剂型
          example: 胶囊剂
        manufacturer:
          type: string
          description: 生产厂家
          example: 广州白云山制药
        approval_number:
          type: string
          description: 批准文号
          example: 国药准字H20050001
        is_prescription:
          type: boolean
          description: 是否处方药
          example: true
        is_medicare:
          type: boolean
          description: 是否医保药品
          example: true
        unit:
          type: string
          description: 销售单位
          example: 盒
        retail_price:
          type: number
          format: decimal
          description: 零售价（元）
          example: 12.5
        status:
          type: integer
          enum:
          - 0
          - 1
          description: 1:启用, 0:停用
          example: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateDrugRequest:
      type: object
      required:
      - drug_code
      - common_name
      - specification
      - manufacturer
      properties:
        drug_code:
          type: string
          maxLength: 50
          description: 药品统一编码，全局唯一
        common_name:
          type: string
          maxLength: 100
        trade_name:
          type: string
          maxLength: 100
        specification:
          type: string
          maxLength: 100
        dosage_form:
          type: string
          maxLength: 50
        manufacturer:
          type: string
          maxLength: 100
        approval_number:
          type: string
          maxLength: 50
        is_prescription:
          type: boolean
          default: false
        is_medicare:
          type: boolean
          default: false
        unit:
          type: string
          maxLength: 20
          default: 盒
        retail_price:
          type: number
          format: decimal
          minimum: 0
    UpdateDrugRequest:
      type: object
      properties:
        common_name:
          type: string
          maxLength: 100
        trade_name:
          type: string
          maxLength: 100
        specification:
          type: string
          maxLength: 100
        dosage_form:
          type: string
          maxLength: 50
        manufacturer:
          type: string
          maxLength: 100
        approval_number:
          type: string
          maxLength: 50
        is_prescription:
          type: boolean
        is_medicare:
          type: boolean
        unit:
          type: string
          maxLength: 20
        retail_price:
          type: number
          format: decimal
          minimum: 0
    DrugPageResult:
      allOf:
      - $ref: '#/components/schemas/PageMeta'
      - type: object
        properties:
          list:
            type: array
            items:
              $ref: '#/components/schemas/DrugInfo'
    DrugSaleInfo:
      type: object
      description: 药品销售信息（精简版，含库存数量）
      properties:
        id:
          type: integer
          format: int64
        drug_code:
          type: string
        common_name:
          type: string
        trade_name:
          type: string
        specification:
          type: string
        manufacturer:
          type: string
        is_prescription:
          type: boolean
        retail_price:
          type: number
          format: decimal
        unit:
          type: string
        in_stock_count:
          type: integer
          description: 当前在库数量（IN_STOCK 状态追溯码数量）
          example: 50
    DrugInventorySummary:
      type: object
      properties:
        drug_id:
          type: integer
          format: int64
        drug_code:
          type: string
        common_name:
          type: string
        pending_count:
          type: integer
          description: 待上架数量
        in_stock_count:
          type: integer
          description: 在库数量
        sold_count:
          type: integer
          description: 已售数量
        loss_candidate_count:
          type: integer
          description: 盘亏候选数量
        nearest_expire_date:
          type: string
          format: date
          description: 最近到期日期
          nullable: true
    LocationInfo:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        location_code:
          type: string
          description: 货位编码，全局唯一
          example: A-01-02-03
        location_name:
          type: string
          example: A区-01架-02层-03位
        area:
          type: string
          description: 区域
          example: A区
        shelf:
          type: string
          description: 货架
          example: '01'
        layer:
          type: string
          description: 层
          example: '02'
        position:
          type: string
          description: 位
          example: '03'
        status:
          type: integer
          enum:
          - 0
          - 1
          description: 1:启用, 0:停用
        in_stock_count:
          type: integer
          description: 当前在库追溯码数量
          example: 10
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateLocationRequest:
      type: object
      required:
      - location_code
      - location_name
      - area
      properties:
        location_code:
          type: string
          maxLength: 50
        location_name:
          type: string
          maxLength: 100
        area:
          type: string
          maxLength: 50
        shelf:
          type: string
          maxLength: 20
        layer:
          type: string
          maxLength: 20
        position:
          type: string
          maxLength: 20
    UpdateLocationRequest:
      type: object
      properties:
        location_name:
          type: string
          maxLength: 100
        area:
          type: string
          maxLength: 50
        shelf:
          type: string
          maxLength: 20
        layer:
          type: string
          maxLength: 20
        position:
          type: string
          maxLength: 20
    LocationPageResult:
      allOf:
      - $ref: '#/components/schemas/PageMeta'
      - type: object
        properties:
          list:
            type: array
            items:
              $ref: '#/components/schemas/LocationInfo'
    InboundOrder:
      type: object
      description: 入库单主表
      properties:
        id:
          type: integer
          format: int64
          example: 1
        order_no:
          type: string
          description: 入库单号，系统自动生成，格式 IN-YYYYMMDD-XXXX
          example: IN-20240101-0001
        status:
          type: string
          enum:
          - DRAFT
          - PENDING_CONFIRM
          - COMPLETED
          - CANCELLED
          description: DRAFT:草稿, PENDING_CONFIRM:待确认, COMPLETED:已完成, CANCELLED:已取消
          example: DRAFT
        supplier_id:
          type: integer
          format: int64
          description: 供应商 ID，关联供应商主数据
          example: 1
        supplier_name:
          type: string
          description: 供应商名称，仅用于展示，由 supplier_id 关联查询得到
          example: 广州白云山制药
        invoice_no:
          type: string
          description: 发票号
          example: INV-2024-001
        total_amount:
          type: number
          format: decimal
          description: 入库总金额（元）
          example: 1250.0
        remark:
          type: string
          description: 备注
        creator_id:
          type: integer
          format: int64
          description: 创建人 ID
        creator_name:
          type: string
          description: 创建人姓名
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    InboundOrderDetail:
      type: object
      description: 入库单明细行
      properties:
        id:
          type: integer
          format: int64
        inbound_order_id:
          type: integer
          format: int64
        drug_id:
          type: integer
          format: int64
        drug_code:
          type: string
        common_name:
          type: string
        trade_name:
          type: string
        specification:
          type: string
        manufacturer:
          type: string
        batch_number:
          type: string
          description: 批号
          example: '20240101'
        expire_date:
          type: string
          format: date
          description: 有效期
          example: '2026-01-01'
        planned_qty:
          type: integer
          description: 计划入库数量
          example: 100
        confirmed_qty:
          type: integer
          description: 已确认（扫码）数量
          example: 50
        unit_price:
          type: number
          format: decimal
          description: 单价（元）
          example: 12.5
        subtotal:
          type: number
          format: decimal
          description: 小计金额
          example: 1250.0
        created_at:
          type: string
          format: date-time
    InboundOrderWithDetails:
      type: object
      description: 入库单及明细
      allOf:
      - $ref: '#/components/schemas/InboundOrder'
      - type: object
        properties:
          details:
            type: array
            items:
              $ref: '#/components/schemas/InboundOrderDetail'
    CreateInboundOrderRequest:
      type: object
      required:
      - supplier_id
      properties:
        supplier_id:
          type: integer
          format: int64
          description: 供应商 ID，必须来自供应商主数据 sys_supplier.id。前端不得仅提交供应商名称。
          example: 1
        invoice_no:
          type: string
          maxLength: 100
        remark:
          type: string
        items:
          type: array
          description: 明细行（可选，也可创建后单独添加）
          items:
            $ref: '#/components/schemas/AddInboundDetailRequest'
    AddInboundDetailRequest:
      type: object
      required:
      - drug_id
      - batch_number
      - expire_date
      - planned_qty
      - unit_price
      properties:
        drug_id:
          type: integer
          format: int64
        batch_number:
          type: string
          maxLength: 50
        expire_date:
          type: string
          format: date
        planned_qty:
          type: integer
          minimum: 1
        unit_price:
          type: number
          format: decimal
          minimum: 0
    UpdateInboundDetailRequest:
      type: object
      properties:
        batch_number:
          type: string
          maxLength: 50
        expire_date:
          type: string
          format: date
        planned_qty:
          type: integer
          minimum: 1
        unit_price:
          type: number
          format: decimal
          minimum: 0
    InboundOrderPageResult:
      allOf:
