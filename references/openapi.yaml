        batch_number:
          type: string
        expire_date:
          type: string
          format: date
        operator_id:
          type: integer
          format: int64
          description: 扫码操作员 ID，由后端根据当前 JWT 用户写入
        scanned_at:
          type: string
          format: date-time
          description: 扫码时间，对应 inventory_task_detail.scanned_at
        scanned_location_id:
          type: integer
          format: int64
          nullable: true
          description: 实际扫描货位 ID，对应 inventory_task_detail.scanned_location_id
        system_location_id:
          type: integer
          format: int64
          nullable: true
          description: 系统记录货位 ID，对应 inventory_task_detail.system_location_id
    CreateInventoryTaskRequest:
      type: object
