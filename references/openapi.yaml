          type: number
          format: decimal
        created_at:
          type: string
          format: date-time
        refund_status:
          type: string
          enum:
          - NONE
          - REFUNDED
          description: 明细级退货状态。NONE:未退货, REFUNDED:已退货。用于支持部分退货。
          example: NONE
        refund_amount:
          type: number
          format: decimal
          description: 该明细已退金额，未退货为 0
          example: 0
        refunded_at:
          type: string
          format: date-time
          nullable: true
          description: 该明细退货时间
        refund_reason:
          type: string
          nullable: true
          description: 该明细退货原因
