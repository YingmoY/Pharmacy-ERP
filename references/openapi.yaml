        properties:
          details:
            type: array
            items:
              $ref: '#/components/schemas/SalesOrderDetail'
    CreateSalesOrderRequest:
      type: object
      required:
      - items
      properties:
        customer_name:
          type: string
          maxLength: 50
          nullable: true
        is_prescription:
          type: boolean
          default: false
          description: 是否处方单；后端仍需结合药品属性计算是否必须审核。
        remark:
          type: string
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
            - drug_id
            - unit_price
            properties:
              drug_id:
                type: integer
                format: int64
              quantity:
                type: integer
                enum:
                - 1
                minimum: 1
                maximum: 1
                default: 1
                description: 固定为 1。保留字段仅用于兼容前端表单，不允许提交大于 1 的数量。
              unit_price:
                type: number
                format: decimal
              trace_code:
                type: string
                description: 指定追溯码。可选；不填则由系统按近效期优先自动匹配一个可售追溯码。
                nullable: true
            description: 销售明细输入项。每个 item 代表一盒药/一个追溯码；购买多盒请传多个 item。
      description: 创建销售单。后端根据 is_prescription 与药品主数据自动判断是否需要药师审核：需要审核时创建为 PENDING_REVIEW，不需要审核时创建为
        PENDING。need_audit 不由前端传入。
