  /api/v1/sales-orders/{id}/refund:
    post:
      tags:
      - 销售管理
      summary: 销售退货
      description: '对 COMPLETED 或 PARTIALLY_REFUNDED 状态的销售单发起退货，触发以下操作：


        1. refund_mode=FULL 时，将销售单状态更新为 REFUNDED。


        2. refund_mode=PARTIAL 时，仅退还 detail_ids 指定的销售明细；如果仍有未退明细，销售单状态更新为 PARTIALLY_REFUNDED。


        3. 如果部分退货后该单所有明细均已退货，销售单状态更新为 REFUNDED。


        4. 将退货明细对应的追溯码状态从 SOLD 恢复为 IN_STOCK。


        5. 在 drug_trace_log 中写入 RETURN 动作记录。'
      operationId: refundSalesOrder
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundSalesOrderRequest'
      responses:
        '200':
          description: 退货成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/SalesOrder'
        '409':
          description: 销售单状态不是 COMPLETED 或 PARTIALLY_REFUNDED，或退货明细状态不允许退货
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '400':
          $ref: '#/components/responses/ValidationError'
      x-permission:
        code: sales.orders.refund
        resource: sales-orders
        action: refund
