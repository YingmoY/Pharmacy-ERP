        common_name:
          type: string
        batch_number:
          type: string
        system_location_code:
          type: string
        actual_location_code:
          type: string
    SalesOrder:
      type: object
      description: 销售单主表
      properties:
        id:
          type: integer
          format: int64
        order_no:
          type: string
          description: 销售单号，格式 SO-YYYYMMDD-XXXX
          example: SO-20240101-0001
        status:
          type: string
          enum:
          - PENDING
          - PENDING_REVIEW
          - APPROVED
          - COMPLETED
          - PARTIALLY_REFUNDED
          - REFUNDED
          - CANCELLED
          description: PENDING:待结算；PENDING_REVIEW:待药师审核；APPROVED:药师已审核、可结算；COMPLETED:已完成；PARTIALLY_REFUNDED:部分退货；REFUNDED:全单退货；CANCELLED:已取消
        customer_name:
          type: string
          nullable: true
        is_prescription:
          type: boolean
          description: 是否处方单。处方药销售必须进入药师审核流程；need_audit 由后端根据 is_prescription 和药品属性计算，前端不得直接控制。
        total_amount:
          type: number
          format: decimal
          description: 应付金额（元）
        actual_amount:
          type: number
          format: decimal
          description: 实付金额（元）
          nullable: true
        payment_method:
          type: string
          enum:
          - CASH
          - WECHAT
          - ALIPAY
          - MEDICARE_CARD
          - OTHER
          nullable: true
        cashier_id:
          type: integer
          format: int64
        cashier_name:
          type: string
        remark:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SalesOrderDetail:
      type: object
