      properties:
        id:
          type: integer
          format: int64
        sales_order_id:
          type: integer
          format: int64
        drug_id:
          type: integer
          format: int64
        drug_code:
          type: string
        common_name:
          type: string
        trade_name:
          type: string
        specification:
          type: string
        manufacturer:
          type: string
        trace_code:
          type: string
          description: 关联追溯码
        batch_number:
          type: string
        expire_date:
          type: string
          format: date
        quantity:
          type: integer
          enum:
          - 1
          minimum: 1
          maximum: 1
          description: 固定为 1。购买多盒同一药品时，应生成多条明细，每条绑定一个追溯码。
          example: 1
        unit_price:
          type: number
          format: decimal
