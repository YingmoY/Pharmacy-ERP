  casbin_policy_csv: deprecated; do not maintain casbin_policy.csv manually
  database_source_tables:
  - sys_role
  - sys_user_role
  - sys_permission
  - sys_role_permission
  - sys_permission_api
  generated_runtime_table: casbin_rule
  refresh_function: refresh_casbin_rule_from_rbac()
  subject_format: user:{id}
  protected_operation_count: 154
  distinct_permission_code_count: 93
  generated_policy_count_estimate: 468
  role_source: sys_role.code; roles are dynamic and are not fixed by OpenAPI enum
  roles_are_dynamic: true
  default_seed_roles:
  - ADMIN
  - STORE_MANAGER
  - PHARMACIST
  - CASHIER
  - WAREHOUSE
  jwt_protected_operation_count: 157
  rbac_protected_operation_count: 154
  self_service_jwt_only_operations:
  - GET /api/v1/auth/me
  - POST /api/v1/auth/logout
  - PUT /api/v1/auth/password
