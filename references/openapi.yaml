          default: 20
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
          enum:
          - PENDING
          - PENDING_REVIEW
          - APPROVED
          - COMPLETED
          - PARTIALLY_REFUNDED
          - REFUNDED
          - CANCELLED
      - name: order_no
        in: query
        description: 按销售单号精确查询
        schema:
          type: string
